<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tabler Icons - HTML 示例</title>
  <!-- <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" /> -->
  <link rel="stylesheet" href="../assets/tabler-icons.min.css" />
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 24px;
      background: #f7f8fa;
      color: #222;
    }
    .row {
      display: flex;
      gap: 20px;
      align-items: center;
      margin: 12px 0;
    }
    .item {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 10px 14px;
    }
    .item i {
      font-size: 22px;
      color: #10275c;
      line-height: 1;
    }
  </style>
</head>
<body>
  <h2>Tabler Icons 在普通 HTML 中的使用（Webfont）</h2>

  <div class="row">
    <div class="item">
      <i class="ti ti-home"></i>
      <span>首页</span>
    </div>

    <div class="item">
      <i class="ti ti-search"></i>
      <span>搜索</span>
    </div>

    <div class="item">
      <i class="ti ti-folder"></i>
      <span>目录</span>
    </div>

    <div class="item">
      <i class="ti ti-photo"></i>
      <span>故事</span>
    </div>

    <div class="item">
      <i class="ti ti-file-zip"></i>
      <span>下载</span>
    </div>

    <div class="item">
      <i class="ti ti-user"></i>
      <span>我的</span>
    </div>
  </div>
</body>
</html>
