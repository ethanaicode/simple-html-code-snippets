<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>我的链接页</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .container {
        max-width: 680px;
        width: 100%;
        background: rgba(255, 255, 255, 0.95);
        border-radius: 24px;
        padding: 48px 32px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        backdrop-filter: blur(10px);
      }

      .header {
        text-align: center;
        margin-bottom: 40px;
      }

      .avatar {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        margin: 0 auto 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 48px;
        color: white;
        font-weight: bold;
        box-shadow: 0 8px 16px rgba(102, 126, 234, 0.4);
      }

      .title {
        font-size: clamp(1.8rem, 4vw, 2.4rem);
        font-weight: 700;
        color: #2d3748;
        margin-bottom: 12px;
      }

      .description {
        font-size: clamp(0.95rem, 2vw, 1.1rem);
        color: #718096;
        line-height: 1.6;
        max-width: 500px;
        margin: 0 auto;
      }

      .links-container {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .link-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 18px 24px;
        background: white;
        border: 2px solid #e2e8f0;
        border-radius: 16px;
        color: #2d3748;
        font-size: 1.05rem;
        font-weight: 600;
        text-decoration: none;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        position: relative;
        overflow: hidden;
      }

      .link-btn::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        opacity: 0;
        transition: opacity 0.3s ease;
        z-index: 0;
      }

      .link-btn span {
        position: relative;
        z-index: 1;
        transition: color 0.3s ease;
      }

      .link-btn:hover {
        transform: translateY(-4px);
        box-shadow: 0 12px 24px rgba(102, 126, 234, 0.3);
        border-color: transparent;
      }

      .link-btn:hover::before {
        opacity: 1;
      }

      .link-btn:hover span {
        color: white;
      }

      .link-btn:active {
        transform: translateY(-2px);
      }

      .link-icon {
        margin-right: 12px;
        font-size: 1.2rem;
      }

      .footer {
        text-align: center;
        margin-top: 40px;
        color: #a0aec0;
        font-size: 0.9rem;
      }

      /* 移动端优化 */
      @media (max-width: 640px) {
        .container {
          padding: 36px 24px;
          border-radius: 20px;
        }

        .avatar {
          width: 80px;
          height: 80px;
          font-size: 40px;
        }

        .link-btn {
          padding: 16px 20px;
          font-size: 1rem;
        }

        .header {
          margin-bottom: 32px;
        }
      }

      /* 响应式间距优化 */
      @media (max-width: 480px) {
        body {
          padding: 16px;
        }

        .container {
          padding: 28px 20px;
        }

        .links-container {
          gap: 12px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <div class="avatar">M</div>
        <h1 class="title">欢迎来到我的主页</h1>
        <p class="description">
          这里收录了我的所有链接，点击下方按钮访问相关页面
        </p>
      </div>

      <div class="links-container">
        <a href="https://1.example.com" class="link-btn" target="_blank">
          <span class="link-icon">🌐</span>
          <span>访问页面 1</span>
        </a>

        <a href="https://2.example.com" class="link-btn" target="_blank">
          <span class="link-icon">🚀</span>
          <span>访问页面 2</span>
        </a>

        <!-- 可以继续添加更多链接 -->
        <!-- <a href="https://example.com" class="link-btn" target="_blank">
          <span class="link-icon">📱</span>
          <span>更多链接</span>
        </a> -->
      </div>

      <div class="footer">
        <p>© 2025 · 所有链接均为外部跳转</p>
      </div>
    </div>
  </body>
</html>
